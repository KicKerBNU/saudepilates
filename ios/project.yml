name: SaudePilates
options:
  bundleIdPrefix: com.saudepilates
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
targets:
  SaudePilates:
    type: application
    platform: iOS
    sources:
      - path: SaudePilates
        excludes:
          - Assets.xcassets
    resources:
      - path: SaudePilates/GoogleService-Info.plist
      - path: SaudePilates/Assets.xcassets
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saudepilates.app
        INFOPLIST_FILE: SaudePilates/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
