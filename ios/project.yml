name: SaudePilates
options:
  bundleIdPrefix: com.saudepilates
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
targets:
  SaudePilates:
    type: application
    platform: iOS
    sources:
      - path: SaudePilates
        excludes:
          - GoogleService-Info.plist
      # XcodeGen treats *-Info.plist specially; must set buildPhase: resources explicitly.
      - path: SaudePilates/GoogleService-Info.plist
        buildPhase: resources
    resources:
      - path: SaudePilates/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saudepilates.app
        INFOPLIST_FILE: SaudePilates/Info.plist
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Developer Team ID (Xcode → Settings → Accounts → Team ID)
        DEVELOPMENT_TEAM: "53K55422K6"
schemes:
  SaudePilates:
    build:
      targets:
        SaudePilates: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
